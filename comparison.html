<!DOCTYPE html>
<html lang="en">
<head>
    <title>Standard Cell Comparison View</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        #info {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            color: #03dac6;
            margin: 0 0 10px 0;
        }
        a {
            color: #bb86fc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .comparison-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, auto);
            gap: 20px;
            max-width: 1600px;
            width: 100%;
            justify-content: center;
        }
        .view-box {
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .view-label {
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #bb86fc;
            font-weight: 600;
        }
        .view-content {
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 4px;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }
        .schematic-box {
            background-color: #ffffff;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1 id="model-name">Loading...</h1>
        <a href="index.html">Back to Gallery</a>
    </div>

    <div class="comparison-container">
        <!-- Top Left: Schematic -->
        <div class="view-box">
            <div class="view-label">Schematic</div>
            <div class="view-content schematic-box">
                <img id="schematic-img" src="" alt="Schematic">
            </div>
        </div>

        <!-- Top Right: 3D View -->
        <div class="view-box">
            <div class="view-label">3D View</div>
            <div class="view-content">
                <iframe id="viewer-iframe" src=""></iframe>
            </div>
        </div>

        <!-- Bottom Left: Top View -->
        <div class="view-box">
            <div class="view-label">LEGO Top View</div>
            <div class="view-content">
                <img id="top-view-img" src="" alt="LEGO Top View">
            </div>
        </div>

        <!-- Bottom Right: LEF PNG -->
        <div class="view-box">
            <div class="view-label">LEF View</div>
            <div class="view-content">
                <img id="lef-view-img" src="" alt="LEF View">
            </div>
        </div>
    </div>

    <script>
        const cellToPdk = {
            "sg13g2_a21o_1": "a21o",
            "sg13g2_a21o_2": "a21o",
            "sg13g2_a21oi_1": "a21oi",
            "sg13g2_a21oi_2": "a21oi",
            "sg13g2_a22oi_1": "a22oi",
            "sg13g2_a221oi_1": "a221oi",
            "sg13g2_and2_1": "and2",
            "sg13g2_and2_2": "and2",
            "sg13g2_and3_1": "and3",
            "sg13g2_and3_2": "and3",
            "sg13g2_and4_1": "and4",
            "sg13g2_and4_2": "and4",
            "sg13g2_antennanp": "diode",
            "sg13g2_buf_1": "buf",
            "sg13g2_buf_16": "buf",
            "sg13g2_buf_2": "buf",
            "sg13g2_buf_4": "buf",
            "sg13g2_buf_8": "buf",
            "sg13g2_decap_4": "decap",
            "sg13g2_decap_8": "decap",
            "sg13g2_dfrbp_1": "dfrbp",
            "sg13g2_dfrbp_2": "dfrbp",
            "sg13g2_dlhq_1": "dlxtp",
            "sg13g2_dlhr_1": "dlrtp",
            "sg13g2_dlhrq_1": "dlrtp",
            "sg13g2_dllr_1": "dlrtp",
            "sg13g2_dllrq_1": "dlrtp",
            "sg13g2_dlygate4sd1_1": "dlygate4sd1",
            "sg13g2_dlygate4sd2_1": "dlygate4sd2",
            "sg13g2_dlygate4sd3_1": "dlygate4sd3",
            "sg13g2_ebufn_2": "ebufn",
            "sg13g2_ebufn_4": "ebufn",
            "sg13g2_ebufn_8": "ebufn",
            "sg13g2_einvn_2": "einvn",
            "sg13g2_einvn_4": "einvn",
            "sg13g2_einvn_8": "einvn",
            "sg13g2_fill_1": "fill",
            "sg13g2_fill_2": "fill",
            "sg13g2_fill_4": "fill",
            "sg13g2_fill_8": "fill",
            "sg13g2_inv_1": "inv",
            "sg13g2_inv_16": "inv",

            "sg13g2_mux2_1": "mux2",

            "sg13g2_nand2_1": "nand2",
            "sg13g2_nand2_2": "nand2",
            "sg13g2_nand2b_1": "nand2b",
            "sg13g2_nand2b_2": "nand2b",

            "sg13g2_o21ai_1": "o21ai",
            "sg13g2_or2_1": "or2",
            "sg13g2_or2_2": "or2",

            "sg13g2_or3_2": "or3",
            "sg13g2_or4_1": "or4",
            "sg13g2_or4_2": "or4",
            "sg13g2_sdfbbp_1": "sdfbbp",
            "sg13g2_sighold": "lpflow_isobufsrc",
            "sg13g2_slgcp_1": "dlclkp",
            "sg13g2_tiehi": "conb",
            "sg13g2_tielo": "conb",
            "sg13g2_xnor2_1": "xnor2",
            "sg13g2_xor2_1": "xor2",
            "sg13g2_dfrbpq_1": "dfrbp",
            "sg13g2_dfrbpq_2": "dfrbp",
            "sg13g2_sdfrbp_1": "sdfrbp",
            "sg13g2_sdfrbp_2": "sdfrbp",
            "sg13g2_sdfrbpq_1": "sdfrbp",
            "sg13g2_sdfrbpq_2": "sdfrbp"
        };

        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model');

        if (!modelName) {
            document.getElementById('model-name').innerText = 'No model specified';
        } else {
            document.getElementById('model-name').innerText = modelName;
            document.getElementById('viewer-iframe').src = 'viewer.html?model=' + modelName + '&embed=1';

            document.getElementById('top-view-img').src = 'images/' + modelName + '_top.png';
            document.getElementById('lef-view-img').src = 'specifications/png/' + modelName + '.png';

            const cellType = cellToPdk[modelName];
            if (cellType) {
                document.getElementById('schematic-img').src = 'https://skywater-pdk.readthedocs.io/en/main/_images/sky130_fd_sc_hd__' + cellType + '.schematic.svg';
            } else {
                document.getElementById('schematic-img').alt = 'No schematic mapping found';
            }

            // Error handling for missing images
            document.getElementById('schematic-img').onerror = function() {
                this.alt = 'Schematic not found';
                this.style.display = 'none';
                this.parentElement.innerHTML += '<div style="padding: 50px; color: #555;">Schematic pending</div>';
            };

            document.getElementById('top-view-img').onerror = function() {
                this.alt = 'Top view not found';
                this.style.display = 'none';
                this.parentElement.innerHTML += '<div style="padding: 50px; color: #555;">Top view pending</div>';
            };

            document.getElementById('lef-view-img').onerror = function() {
                this.alt = 'LEF view not found';
                this.style.display = 'none';
                this.parentElement.innerHTML += '<div style="padding: 50px; color: #555;">LEF view pending</div>';
            };
        }
    </script>
</body>
</html>
