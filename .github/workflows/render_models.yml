name: Render LEGO Models

on:
  push:
    branches:
      - main
    paths:
      - 'models/*.ldr'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb unzip curl libgl1-mesa-glx libglu1-mesa

      - name: Install LDraw parts library
        run: |
          mkdir -p ldraw
          curl -L http://www.ldraw.org/library/updates/complete.zip -o ldraw.zip
          unzip ldraw.zip -d ldraw
          rm ldraw.zip

      - name: Install LDView
        run: |
          curl -L https://tc1p.it/ldview-static -o ldview
          chmod +x ldview
          sudo mv ldview /usr/local/bin/

      - name: Render models
        run: |
          mkdir -p images
          for file in models/*.ldr; do
            filename=$(basename "$file" .ldr)
            xvfb-run -a ldview "$file" -SaveJPG="images/${filename}.jpg" -Width=800 -Height=600 -LDrawDir=ldraw/ldraw
          done

      - name: Commit and push images
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-render LEGO models to images"
          file_pattern: 'images/*.jpg'
