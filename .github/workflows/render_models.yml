name: Render LEGO Models

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      LIBGL_ALWAYS_SOFTWARE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl libgl1 libglu1-mesa libglx0 libopengl0 libgl1-mesa-dri zstd libosmesa6 libosmesa6-dev xvfb img2pdf

      - name: Install LDraw parts library and LDView (OSMesa)
        run: |
          curl -L http://download.opensuse.org/repositories/home:/pbartfai/xUbuntu_24.04/amd64/ldraw_2025.09-1_amd64.deb -o ldraw.deb
          curl -L https://download.opensuse.org/repositories/home:/pbartfai/xUbuntu_24.04/amd64/ldview-osmesa_4.7-1_amd64.deb -o ldview.deb
          sudo apt-get install -y ./ldraw.deb ./ldview.deb

      - name: Create LDView config directory
        run: |
          mkdir -p ~/.config/LDView/
          touch ~/.config/LDView/ldviewrc

      - name: Render models
        run: |
          chmod +x scripts/render_models.sh
          xvfb-run -a -s "-screen 0 800x600x24" ./scripts/render_models.sh

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-render LEGO models"
          file_pattern: 'images/'
          push_options: '--force'

      - name: Upload instructions artifact
        uses: actions/upload-artifact@v4
        with:
          name: instructions
          path: instructions/
