name: Render LEGO Models

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  render:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl libgl1 libglu1-mesa libglx0 libopengl0 libgl1-mesa-dri zstd ffmpeg python3 xvfb

      - name: Install LDraw parts library and LDView (OSMesa)
        run: |
          curl -L http://download.opensuse.org/repositories/home:/pbartfai/xUbuntu_24.04/amd64/ldraw_2025.09-1_amd64.deb -o ldraw.deb
          curl -L https://download.opensuse.org/repositories/home:/pbartfai/xUbuntu_24.04/amd64/ldview-osmesa_4.7-1_amd64.deb -o ldview.deb
          sudo apt-get install -y ./ldraw.deb ./ldview.deb

      - name: Render models
        run: |
          mkdir -p images
          rm -f images/*.jpg images/*.mp4
          for file in models/*.ldr; do
            filename=$(basename "$file" .ldr)
            echo "Rendering static image for ${filename}..."
            xvfb-run ldview "$file" -SaveJPG="images/${filename}.jpg" -Width=800 -Height=600 -LDrawDir=/usr/share/ldraw || true

            echo "Rendering rotation frames for ${filename}..."
            for i in $(seq 0 1 35); do
              angle=$((i * 10))
              xvfb-run ldview "$file" -SaveJPG="images/${filename}_tmp_$(printf "%02d" $i).jpg" -Width=400 -Height=300 -CameraGlobe="30,${angle},1.2" -LDrawDir=/usr/share/ldraw || true
            done

            if ls images/${filename}_tmp_*.jpg 1> /dev/null 2>&1; then
              echo "Compiling video for ${filename}..."
              ffmpeg -y -i "images/${filename}_tmp_%02d.jpg" -vcodec libx264 -pix_fmt yuv420p -r 10 "images/${filename}.mp4"
              rm -f images/${filename}_tmp_*.jpg
            else
              echo "No frames generated for ${filename}"
            fi
          done

      - name: Generate Gallery
        run: python3 scripts/generate_gallery.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-render LEGO models, videos and update gallery"
          file_pattern: 'images/ index.html'
          push_options: '--force'

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: render
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
