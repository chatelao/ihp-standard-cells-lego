name: Render LEGO Models

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl libgl1 libglu1-mesa libglx0 libopengl0 libgl1-mesa-dri zstd ldraw-parts-free

      - name: Install LDView
        run: |
          curl -L https://tc1p.it/ldview-static -o ldview.tar.zst
          zstd -d ldview.tar.zst
          tar -xf ldview.tar
          chmod +x ldview
          sudo mv ldview /usr/local/bin/

      - name: Render models
        run: |
          mkdir -p images
          for file in models/*.ldr; do
            filename=$(basename "$file" .ldr)
            ldview "$file" -SaveJPG="images/${filename}.jpg" -Width=800 -Height=600 -LDrawDir=/usr/share/ldraw
          done

      - name: Commit and push images
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-render LEGO models to images"
          file_pattern: 'images/*.jpg'
