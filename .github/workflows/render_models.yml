name: Render LEGO Models

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-24.04
    env:
      LIBGL_ALWAYS_SOFTWARE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl libgl1 libglu1-mesa libglx0 libopengl0 libgl1-mesa-dri zstd libosmesa6 libosmesa6-dev ffmpeg xvfb

      - name: Install LDraw parts library and LDView (OSMesa)
        run: |
          curl -L http://download.opensuse.org/repositories/home:/pbartfai/xUbuntu_24.04/amd64/ldraw_2025.09-1_amd64.deb -o ldraw.deb
          curl -L https://download.opensuse.org/repositories/home:/pbartfai/xUbuntu_24.04/amd64/ldview-osmesa_4.7-1_amd64.deb -o ldview.deb
          sudo apt-get install -y ./ldraw.deb ./ldview.deb

      - name: Create LDView config directory
        run: |
          mkdir -p ~/.config/LDView/
          touch ~/.config/LDView/ldviewrc

      - name: Render models and generate videos
        run: |
          mkdir -p images
          rm -f images/*.jpg images/*.mp4
          xvfb-run -a -s "-screen 0 800x600x24" bash -c '
            set -e
            shopt -s nullglob
            for file in models/*.ldr; do
              filename=$(basename "$file" .ldr)
              echo "Rendering $filename..."

              # Static image
              ldview "$file" -SaveJPG="images/${filename}.jpg" -Width=800 -Height=600 -LDrawDir=/usr/share/ldraw

              # Rotation frames for video
              mkdir -p "temp_${filename}"
              for i in $(seq 0 35); do
                lon=$((i * 10))
                printf -v frame "%02d" $i
                ldview "$file" -SaveJPG="temp_${filename}/frame_${frame}.jpg" -Width=800 -Height=600 -LDrawDir=/usr/share/ldraw -Longitude=$lon -Latitude=30
              done

              # Verify frames and generate video
              echo "Contents of temp_${filename}:"
              ls -la "temp_${filename}"

              if [ -n "$(ls -A temp_${filename}/frame_*.jpg 2>/dev/null)" ]; then
                echo "Generating video for $filename..."
                # Using the printf format but ensuring it matches the generated files
                ffmpeg -y -r 10 -i "temp_${filename}/frame_%02d.jpg" -vcodec libx264 -crf 25 -pix_fmt yuv420p "images/${filename}.mp4"
              else
                echo "Warning: No frames generated for $filename, skipping video."
              fi
              rm -rf "temp_${filename}"
            done
          '

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-render LEGO models"
          file_pattern: 'images/'
          push_options: '--force'
